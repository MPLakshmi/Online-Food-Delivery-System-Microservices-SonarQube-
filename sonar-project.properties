# =============================================
# SonarQube Project Configuration
# Online Food Delivery System
# =============================================

sonar.projectKey=Food-Delivery-System
sonar.projectName=Online Food Delivery System
sonar.projectVersion=1.0.0

# Source directories (all services + frontend)
sonar.sources=.

# Exclude non-source directories
sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/env/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/.git/**,\
  **/coverage/**

# Python settings
sonar.python.version=3.9

# JavaScript/React settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8

# SonarQube Server (update with your server URL and token)
sonar.host.url=http://localhost:9000
sonar.login=sqa_f979d8aeb30eb97b6020f05c5b199ab81a847ce6

# Language-specific analysis
sonar.python.coverage.reportPaths=coverage.xml

# Issue thresholds
sonar.qualitygate.wait=true
